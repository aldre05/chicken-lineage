<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chicken Saga — Lineage Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  :root {
    --gold: #f5a623; --gold-dim: #7a5010; --amber: #ffcf6b;
    --bg: #0c0c0f; --bg2: #13131a; --bg3: #1a1a24;
    --text: #e8d5a3; --text-dim: #6a6080;
    --border: rgba(245,166,35,0.2);
    --root-col: #f5a623; --anc-col: #7ec8ff;
    --desc-col: #4cff91; --unk-col: #c084fc;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Crimson Pro',serif; overflow:hidden; height:100vh; }

  /* Header */
  #header {
    position:fixed; top:0; left:0; right:0; z-index:100;
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 24px;
    background:rgba(12,12,15,0.98);
    border-bottom:1px solid var(--border);
  }
  .logo { font-family:'Cinzel',serif; font-size:15px; font-weight:900; letter-spacing:3px; color:var(--gold); }
  .logo small { display:block; font-size:9px; font-weight:400; color:var(--text-dim); letter-spacing:2px; margin-top:1px; }

  #controls { display:flex; align-items:center; gap:10px; }
  #search-input {
    background:rgba(255,255,255,0.05); border:1px solid var(--border);
    border-radius:6px; padding:8px 14px; color:var(--text);
    font-family:'Crimson Pro',serif; font-size:16px; width:180px; outline:none;
    transition:border-color 0.2s, box-shadow 0.2s;
  }
  #search-input::placeholder { color:var(--text-dim); }
  #search-input:focus { border-color:var(--gold); box-shadow:0 0 0 3px rgba(245,166,35,0.1); }
  .ctrl-label { font-family:'Cinzel',serif; font-size:10px; letter-spacing:1px; color:var(--text-dim); }
  #depth-select {
    background:rgba(255,255,255,0.05); border:1px solid var(--border);
    border-radius:5px; padding:7px 10px; color:var(--text);
    font-family:'Crimson Pro',serif; font-size:14px; outline:none; cursor:pointer;
  }
  #search-btn {
    background:var(--gold); color:#0c0c0f; border:none; border-radius:6px;
    padding:8px 20px; font-family:'Cinzel',serif; font-size:12px; font-weight:700;
    letter-spacing:1px; cursor:pointer; transition:background 0.2s, transform 0.1s;
  }
  #search-btn:hover { background:var(--amber); }
  #search-btn:active { transform:scale(0.97); }
  #search-btn:disabled { opacity:0.4; cursor:not-allowed; }

  /* Canvas - pannable/zoomable */
  #canvas {
    position:fixed; top:58px; left:0; right:0; bottom:0;
    overflow:hidden; cursor:grab;
  }
  #canvas:active { cursor:grabbing; }
  #scene { transform-origin: 0 0; will-change:transform; }

  /* Node cards */
  .node {
    position:absolute;
    width:96px;
    background:var(--bg2);
    border-radius:10px;
    border:2px solid var(--gold);
    overflow:hidden;
    cursor:pointer;
    transition:transform 0.15s, box-shadow 0.15s;
    user-select:none;
  }
  .node:hover { transform:scale(1.05); box-shadow:0 8px 32px rgba(0,0,0,0.6); z-index:10; }
  .node.root { border-width:3px; border-color:var(--root-col); box-shadow:0 0 20px rgba(245,166,35,0.3); }
  .node.ancestor { border-color:var(--anc-col); }
  .node.descendant { border-color:var(--desc-col); }
  .node.unknown { border-color:var(--unk-col); opacity:0.7; }

  .node-img { width:100%; height:74px; object-fit:cover; display:block; background:var(--bg3); }
  .node-img-placeholder {
    width:100%; height:74px; display:flex; align-items:center; justify-content:center;
    background:var(--bg3); font-size:28px; opacity:0.4;
  }
  .node-divider { height:1px; opacity:0.3; }
  .node-label {
    padding:5px 4px 6px;
    text-align:center;
    font-family:'Cinzel',serif; font-size:11px; font-weight:700;
    line-height:1.3;
  }
  .node-ip { font-family:'Crimson Pro',serif; font-size:10px; font-weight:300; display:block; opacity:0.9; }

  /* SVG connectors (behind nodes) */
  #connectors { position:absolute; top:0; left:0; pointer-events:none; overflow:visible; }

  /* Info panel */
  #info-panel {
    position:fixed; right:20px; top:72px;
    width:260px; background:rgba(19,19,26,0.97);
    border:1px solid var(--border); border-radius:12px; padding:18px;
    backdrop-filter:blur(12px);
    transform:translateX(300px);
    transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    z-index:200;
  }
  #info-panel.open { transform:translateX(0); }
  .panel-close { position:absolute; top:12px; right:12px; background:none; border:none; color:var(--text-dim); font-size:16px; cursor:pointer; }
  .panel-close:hover { color:var(--text); }
  .panel-id { font-family:'Cinzel',serif; font-size:22px; font-weight:900; color:var(--gold); }
  .panel-sub { font-size:13px; color:var(--text-dim); margin-bottom:12px; padding-bottom:12px; border-bottom:1px solid var(--border); }
  .panel-row { display:flex; justify-content:space-between; font-size:13px; margin-bottom:7px; color:var(--text-dim); }
  .panel-row b { color:var(--text); font-weight:400; }
  .panel-btn {
    display:block; width:100%; margin-top:10px;
    background:transparent; border:1px solid var(--gold); color:var(--gold);
    border-radius:6px; padding:7px; font-family:'Cinzel',serif;
    font-size:11px; letter-spacing:1px; cursor:pointer; text-align:center;
    text-decoration:none; transition:background 0.2s, color 0.2s;
  }
  .panel-btn:hover { background:var(--gold); color:#0c0c0f; }

  /* Status */
  #status {
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    background:rgba(19,19,26,0.97); border:1px solid var(--border);
    border-radius:30px; padding:9px 22px; font-size:13px; color:var(--text-dim);
    z-index:300; display:none; align-items:center; gap:8px;
  }
  #status.show { display:flex; }
  .spinner { width:14px; height:14px; border:2px solid var(--gold-dim); border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* Empty state */
  #empty {
    position:fixed; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:14px; pointer-events:none;
  }
  .empty-h { font-family:'Cinzel',serif; font-size:52px; font-weight:900; color:var(--gold); letter-spacing:5px; text-shadow:0 0 80px rgba(245,166,35,0.25); }
  .empty-p { font-size:17px; color:var(--text-dim); max-width:380px; text-align:center; line-height:1.7; }
  .empty-hint { font-family:'Cinzel',serif; font-size:11px; color:var(--gold-dim); letter-spacing:2px; }

  /* Legend + stats */
  #legend { position:fixed; bottom:20px; left:20px; display:flex; flex-direction:column; gap:7px; z-index:100; }
  .leg { display:flex; align-items:center; gap:7px; font-family:'Cinzel',serif; font-size:10px; letter-spacing:1px; color:var(--text-dim); }
  .leg-dot { width:10px; height:10px; border-radius:2px; flex-shrink:0; }
  #stat-bar { position:fixed; bottom:20px; right:20px; font-family:'Cinzel',serif; font-size:10px; color:var(--text-dim); letter-spacing:1px; text-align:right; z-index:100; line-height:1.8; }
  #stat-bar span { color:var(--gold); }
</style>
</head>
<body>

<div id="header">
  <div class="logo">🐔 CHICKEN SAGA <small>LINEAGE EXPLORER</small></div>
  <div id="controls">
    <span class="ctrl-label">DEPTH</span>
    <select id="depth-select">
      <option value="2">2</option>
      <option value="3" selected>3</option>
      <option value="4">4</option>
      <option value="5">5</option>
    </select>
    <input id="search-input" type="number" placeholder="Chicken ID..." min="1">
    <button id="search-btn">EXPLORE</button>
  </div>
</div>

<div id="canvas">
  <svg id="connectors"></svg>
  <div id="scene"></div>
</div>

<div id="info-panel">
  <button class="panel-close" id="panel-close">✕</button>
  <div class="panel-id" id="panel-id"></div>
  <div class="panel-sub" id="panel-sub"></div>
  <div id="panel-body"></div>
  <a class="panel-btn" id="panel-link" href="#" target="_blank">VIEW IN GAME ↗</a>
  <button class="panel-btn" id="panel-explore">EXPLORE THIS CHICKEN</button>
</div>

<div id="status"><div class="spinner"></div><span id="status-text">Loading...</span></div>

<div id="empty">
  <div class="empty-h">LINEAGE</div>
  <div class="empty-p">Enter a Chicken ID to explore its full family tree — ancestors above, descendants below.</div>
  <div class="empty-hint">↑ SEARCH BY CHICKEN ID</div>
</div>

<div id="legend">
  <div class="leg"><div class="leg-dot" style="background:var(--root-col)"></div>ROOT</div>
  <div class="leg"><div class="leg-dot" style="background:var(--anc-col)"></div>ANCESTORS</div>
  <div class="leg"><div class="leg-dot" style="background:var(--desc-col)"></div>DESCENDANTS</div>
  <div class="leg"><div class="leg-dot" style="background:var(--unk-col)"></div>UNKNOWN</div>
</div>
<div id="stat-bar">Chickens: <span id="sn">0</span><br>Connections: <span id="sl">0</span></div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────────
const NODE_W = 96, NODE_H = 114, H_GAP = 28, V_GAP = 56;
const cache = new Map();
let rootId = null;
let renderedNodes = []; // {id, x, y, role}
let renderedEdges = []; // {x1,y1,x2,y2}

// ── Pan/Zoom ───────────────────────────────────────────────────────────────────
let panX = 0, panY = 0, scale = 1;
let dragging = false, lastMX = 0, lastMY = 0;
const canvas = document.getElementById('canvas');
const scene  = document.getElementById('scene');

canvas.addEventListener('mousedown', e => {
  if (e.target.closest('.node')) return;
  dragging = true; lastMX = e.clientX; lastMY = e.clientY;
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  panX += e.clientX - lastMX; panY += e.clientY - lastMY;
  lastMX = e.clientX; lastMY = e.clientY;
  applyTransform();
});
window.addEventListener('mouseup', () => { dragging = false; });
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  scale = Math.min(2.5, Math.max(0.2, scale * delta));
  applyTransform();
}, { passive: false });

function applyTransform() {
  scene.style.transform = `translate(${panX}px,${panY}px) scale(${scale})`;
  document.getElementById('connectors').style.transform = scene.style.transform;
}

function centerOn(x, y) {
  const vw = window.innerWidth, vh = window.innerHeight - 58;
  panX = vw/2 - x * scale;
  panY = vh/2 - y * scale;
  applyTransform();
}

// ── API ────────────────────────────────────────────────────────────────────────
async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function fetchChicken(id) {
  const k = String(id);
  if (cache.has(k)) return cache.get(k);
  try {
    // Use Chicken Saga's own proxy - no CORS issues, no rate limits
    const r = await fetch(`https://app.chickensaga.com/api/proxy?tokenId=${id}`);
    if (!r.ok) { cache.set(k, null); return null; }
    const d = await r.json();
    if (!d || !d.attributes) { cache.set(k, null); return null; }
    cache.set(k, d);
    return d;
  } catch { cache.set(k, null); return null; }
}

function attr(attrs, name) {
  const a = (attrs||[]).find(x => x.trait_type === name);
  return a ? a.value : null;
}

function parse(data, id) {
  if (!data || data.error) return { id: String(id), unknown: true, ip: 0, parent1:'0', parent2:'0' };
  // Handle nested metadata structure
  const d = data.metadata || data;
  const a = d.attributes || data.attributes || [];
  const iAtk=+attr(a,'Innate Attack')||0, iDef=+attr(a,'Innate Defense')||0,
        iSpd=+attr(a,'Innate Speed')||0,  iHp=+attr(a,'Innate Health')||0;
  return {
    id: String(d.token_id || d.id || data.token_id || data.id || id),
    image: d.image || data.image || '',
    gen:    attr(a,'Generation') || '',
    type:   attr(a,'Type') || '',
    instinct: attr(a,'Instinct') || '',
    level:  attr(a,'Level') || 1,
    breedCount: +attr(a,'Breed Count') || 0,
    body:   attr(a,'Body') || '',
    gender: attr(a,'Gender') || '',
    parent1: String(attr(a,'Parent 1') || '0'),
    parent2: String(attr(a,'Parent 2') || '0'),
    iAtk, iDef, iSpd, iHp,
    ip: iAtk*2+iDef*2+iSpd*2+iHp,
    unknown: false
  };
}

// ── Tree building ──────────────────────────────────────────────────────────────
async function buildDescTree(id, depth, maxDepth, visited = new Set()) {
  const k = String(id);
  if (visited.has(k)) return null;
  visited.add(k);

  const data = await fetchChicken(id);
  const chicken = parse(data, id);
  const node = { chicken, children: [] };

  if (depth < maxDepth && !chicken.unknown) {
    const gen = depth === 0 ? 'children' : depth === 1 ? 'grandchildren' : `gen-${depth+1} descendants`;
    const childIds = await findChildren(k);
    if (childIds.length > 0) {
      setStatus(`Found ${childIds.length} ${gen} of #${id}, scanning their offspring…`);
      // Scan each child's children sequentially to avoid overwhelming the API
      for (const cid of childIds) {
        const child = await buildDescTree(cid, depth+1, maxDepth, visited);
        if (child) node.children.push(child);
      }
    }
  }
  return node;
}

async function findChildren(parentId) {
  const pid = parseInt(parentId);
  const found = [];
  const CHUNK    = 30;  // 30 IDs per batch call, all parallel server-side (~300ms per call)
  const PARALLEL = 3;   // 3 batch calls at once = 90 simultaneous Sky Mavis calls (safe rate)

  const scanStart = pid >= 11111 ? pid + 1 : 2223;
  const scanEnd   = 20000;

  const chunks = [];
  for (let s = scanStart; s <= scanEnd; s += CHUNK) {
    chunks.push([s, Math.min(s + CHUNK - 1, scanEnd)]);
  }

  for (let i = 0; i < chunks.length; i += PARALLEL) {
    const pct = Math.round((i / chunks.length) * 100);
    setStatus(`Scanning #${parentId} offspring… ${pct}% (${found.length} found)`);

    await Promise.all(chunks.slice(i, i + PARALLEL).map(async ([start, end]) => {
      try {
        const r = await fetch(`/api/batch?parent=${parentId}&start=${start}&end=${end}`);
        if (!r.ok) return;
        const data = await r.json();
        (data.children || []).forEach(c => {
          cache.set(String(c.token_id), c);
          found.push(String(c.token_id));
        });
      } catch { /* skip failed chunks */ }
    }));
  }
  return found;
}

async function buildAncTree(id, depth, maxDepth) {
  const data = await fetchChicken(id);
  const chicken = parse(data, id);
  const node = { chicken, parents: [] };

  if (depth < maxDepth && !chicken.unknown) {
    const ps = await Promise.all([
      chicken.parent1 !== '0' ? buildAncTree(chicken.parent1, depth+1, maxDepth) : null,
      chicken.parent2 !== '0' ? buildAncTree(chicken.parent2, depth+1, maxDepth) : null,
    ]);
    node.parents = ps.filter(Boolean);
  }
  return node;
}

// ── Layout ─────────────────────────────────────────────────────────────────────
function descSubtreeWidth(node) {
  if (!node || node.chicken.unknown) return NODE_W;
  const validChildren = node.children.filter(c => c && !c.chicken.unknown);
  if (!validChildren.length) return NODE_W;
  const total = validChildren.reduce((s,c) => s + descSubtreeWidth(c) + H_GAP, -H_GAP);
  return Math.max(NODE_W, total);
}

function layoutDesc(node, cx, y, role, positions) {
  if (!node || node.chicken.unknown) return;
  const x = cx - NODE_W/2;
  positions.push({ chicken: node.chicken, x, y, role });
  const validChildren = node.children.filter(c => c && !c.chicken.unknown);
  const childW = validChildren.map(descSubtreeWidth);
  const totalW = childW.reduce((s,w) => s+w+H_GAP, -H_GAP);
  let curX = cx - (totalW > 0 ? totalW/2 : 0);
  validChildren.forEach((child, i) => {
    const ccx = curX + childW[i]/2;
    layoutDesc(child, ccx, y + NODE_H + V_GAP, 'descendant', positions);
    curX += childW[i] + H_GAP;
  });
  // Edges are derived from parent/child IDs after layout, not here
}

function ancSubtreeWidth(node) {
  if (!node.parents.length) return NODE_W;
  const total = node.parents.reduce((s,p) => s + ancSubtreeWidth(p) + H_GAP, -H_GAP);
  return Math.max(NODE_W, total);
}

function layoutAnc(node, cx, y, positions) {
  if (!node || node.chicken.unknown) return;
  const x = cx - NODE_W/2;
  positions.push({ chicken: node.chicken, x, y, role: 'ancestor' });
  const validParents = node.parents.filter(p => p && !p.chicken.unknown);
  const parW = validParents.map(ancSubtreeWidth);
  const totalW = parW.reduce((s,w) => s+w+H_GAP, -H_GAP);
  let curX = cx - (totalW > 0 ? totalW/2 : 0);
  validParents.forEach((par, i) => {
    const pcx = curX + parW[i]/2;
    layoutAnc(par, pcx, y - NODE_H - V_GAP, positions);
    curX += parW[i] + H_GAP;
  });
  // Edges derived from parent IDs after layout
}

// ── Render ─────────────────────────────────────────────────────────────────────
function ipColor(ip) {
  if (ip>=220) return '#4cff91';
  if (ip>=190) return '#ffd700';
  if (ip>=160) return '#e8d5a3';
  return '#ff5c5c';
}
function roleColor(role) {
  return {root:'#f5a623', ancestor:'#7ec8ff', descendant:'#4cff91', unknown:'#c084fc'}[role] || '#f5a623';
}

function renderAll(positions) {
  if (!positions.length) return; // nothing to render
  const scene = document.getElementById('scene');
  scene.innerHTML = '';

  const svg = document.getElementById('connectors');
  const xs = positions.map(p=>p.x), ys = positions.map(p=>p.y);
  const ex = renderedEdges.flatMap(e=>[e.x1,e.x2]);
  const ey = renderedEdges.flatMap(e=>[e.y1,e.y2]);
  const allX = xs.length ? [...xs, ...ex] : [0];
  const allY = ys.length ? [...ys, ...ey] : [0];
  const minX = Math.min(...allX)-200, minY = Math.min(...allY)-200;
  const maxX = Math.max(...allX)+300, maxY = Math.max(...allY)+200;
  const svgW = maxX-minX, svgH = maxY-minY;

  svg.setAttribute('width', svgW);
  svg.setAttribute('height', svgH);
  svg.setAttribute('viewBox', `${minX} ${minY} ${svgW} ${svgH}`);
  svg.innerHTML = '';

  // Draw edges
  renderedEdges.forEach(({x1,y1,x2,y2}) => {
    const mid = (y1+y2)/2;
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', `M${x1},${y1} C${x1},${mid} ${x2},${mid} ${x2},${y2}`);
    path.setAttribute('fill','none');
    path.setAttribute('stroke','rgba(245,166,35,0.3)');
    path.setAttribute('stroke-width','2');
    svg.appendChild(path);
  });

  // Draw nodes
  positions.forEach(({chicken, x, y, role}) => {
    const col = chicken.unknown ? '#c084fc' : roleColor(role);
    const div = document.createElement('div');
    div.className = `node ${chicken.unknown ? 'unknown' : role}`;
    div.style.left = x + 'px';
    div.style.top  = y + 'px';
    div.style.borderColor = col;
    if (role === 'root') div.style.boxShadow = `0 0 24px rgba(245,166,35,0.35)`;

    if (chicken.image && !chicken.unknown) {
      const img = document.createElement('img');
      img.className = 'node-img';
      img.src = chicken.image;
      img.alt = `#${chicken.id}`;
      img.onerror = () => { img.style.display='none'; ph.style.display='flex'; };
      div.appendChild(img);
    }
    const ph = document.createElement('div');
    ph.className = 'node-img-placeholder';
    ph.textContent = '🐔';
    ph.style.display = (chicken.image && !chicken.unknown) ? 'none' : 'flex';
    div.appendChild(ph);

    const divider = document.createElement('div');
    divider.className = 'node-divider';
    divider.style.background = col;
    div.appendChild(divider);

    const label = document.createElement('div');
    label.className = 'node-label';
    label.style.color = col;
    label.textContent = `#${chicken.id}`;
    if (!chicken.unknown && chicken.ip > 0) {
      const ipEl = document.createElement('span');
      ipEl.className = 'node-ip';
      ipEl.style.color = ipColor(chicken.ip);
      ipEl.textContent = `IP ${chicken.ip}`;
      label.appendChild(ipEl);
    }
    div.appendChild(label);

    div.addEventListener('click', () => showPanel(chicken));
    scene.appendChild(div);
  });

  document.getElementById('sn').textContent = positions.length;
  document.getElementById('sl').textContent = renderedEdges.length;
  document.getElementById('empty').style.display = 'none';

  // Center on root
  const rootPos = positions.find(p => p.role === 'root');
  if (rootPos) {
    scale = 1;
    centerOn(rootPos.x + NODE_W/2, rootPos.y + NODE_H/2);
  }
}

// ── Info panel ─────────────────────────────────────────────────────────────────
function showPanel(c) {
  document.getElementById('panel-id').textContent = `#${c.id}`;
  document.getElementById('panel-sub').textContent =
    c.unknown ? 'Unknown Chicken' : `${c.gen} · ${c.type} · ${c.gender}`;
  document.getElementById('panel-link').href =
    `https://app.chickensaga.com/inventory/chickens/${c.id}`;
  document.getElementById('panel-explore').onclick = () => explore(c.id);
  document.getElementById('panel-body').innerHTML = c.unknown
    ? `<div style="color:var(--text-dim);font-size:13px">No data available.</div>`
    : `<div class="panel-row"><span>Instinct</span><b>${c.instinct}</b></div>
       <div class="panel-row"><span>Level</span><b>${c.level}</b></div>
       <div class="panel-row"><span>Body</span><b>${c.body}</b></div>
       <div class="panel-row"><span>Breeds left</span><b>${3-c.breedCount}/3</b></div>
       <div class="panel-row"><span>Innate Points</span><b style="color:${ipColor(c.ip)}">${c.ip}</b></div>
       <div class="panel-row" style="font-size:12px"><span>ATK/DEF/SPD/HP</span><b>${c.iAtk}/${c.iDef}/${c.iSpd}/${c.iHp}</b></div>
       ${c.parent1!=='0'?`<div class="panel-row"><span>Parent 1</span><b style="color:var(--anc-col);cursor:pointer" onclick="explore('${c.parent1}')">#${c.parent1}</b></div>`:''}
       ${c.parent2!=='0'?`<div class="panel-row"><span>Parent 2</span><b style="color:var(--anc-col);cursor:pointer" onclick="explore('${c.parent2}')">#${c.parent2}</b></div>`:''}`;
  document.getElementById('info-panel').classList.add('open');
}
document.getElementById('panel-close').onclick = () =>
  document.getElementById('info-panel').classList.remove('open');

// ── Status ──────────────────────────────────────────────────────────────────────
function setStatus(msg) {
  document.getElementById('status-text').textContent = msg;
  document.getElementById('status').classList.add('show');
}
function clearStatus() { document.getElementById('status').classList.remove('show'); }

// ── Main explore ────────────────────────────────────────────────────────────────
async function explore(id) {
  id = String(id);
  rootId = id;
  renderedEdges = [];
  document.getElementById('info-panel').classList.remove('open');
  document.getElementById('search-btn').disabled = true;
  document.getElementById('scene').innerHTML = '';
  document.getElementById('connectors').innerHTML = '';

  const maxDepth = parseInt(document.getElementById('depth-select').value);
  const ANC_DEPTH = Math.min(2, maxDepth);
  const rootCX = 0;

  // Fetch root first so we know if it has parents (affects vertical layout)
  setStatus(`Loading #${id}…`);
  const rootData = await fetchChicken(id);
  const rootChicken = parse(rootData, id);
  const hasParents = rootChicken.parent1 !== '0' || rootChicken.parent2 !== '0';
  const rootY = hasParents ? ANC_DEPTH * (NODE_H + V_GAP) + 40 : 40;

  // Load full tree
  setStatus(`Finding descendants of #${id}…`);
  const descTree = await buildDescTree(id, 0, maxDepth);

  setStatus(`Finding ancestors of #${id}…`);
  const ancTree = await buildAncTree(id, 0, ANC_DEPTH);

  clearStatus();

  renderedEdges = [];
  const positions = [];

  // First pass: layout with rootCX=0 to get relative positions
  if (descTree) layoutDesc(descTree, 0, rootY, 'root', positions);
  if (positions[0]) positions[0].role = 'root';

  if (ancTree && ancTree.parents.length) {
    const ancPositions = [];
    const validPars = ancTree.parents.filter(p => p && !p.chicken.unknown);
    validPars.forEach((par, i) => {
      const offset = (i - (validPars.length - 1) / 2) * (NODE_W * 2 + H_GAP);
      layoutAnc(par, offset, rootY - NODE_H - V_GAP, ancPositions);
    });
    positions.push(...ancPositions);
  }

  // Shift all positions so minimum x = padding
  const PAD = 60;
  const minX = positions.length ? Math.min(...positions.map(p => p.x)) : PAD;
  const shiftX = PAD - minX;
  positions.forEach(p => p.x += shiftX);
  renderedEdges.forEach(e => { e.x1 += shiftX; e.x2 += shiftX; });

  // Re-derive ALL edges from the final shifted positions using parent/child IDs
  // This guarantees edges always connect the correct nodes
  const posMap = new Map(positions.map(p => [p.chicken.id, p]));
  renderedEdges = [];
  positions.forEach(p => {
    const c = p.chicken;
    if (c.unknown) return;
    // Draw edge FROM each parent TO this node
    [c.parent1, c.parent2].forEach(pid => {
      if (pid && pid !== '0' && posMap.has(pid)) {
        const par = posMap.get(pid);
        renderedEdges.push({
          x1: par.x + NODE_W/2, y1: par.y + NODE_H,
          x2: p.x   + NODE_W/2, y2: p.y
        });
      }
    });
  });

  renderAll(positions);
  document.getElementById('search-btn').disabled = false;
}

// Controls
document.getElementById('search-btn').onclick = () => {
  const v = document.getElementById('search-input').value.trim();
  if (v) explore(v);
};
document.getElementById('search-input').onkeydown = e => {
  if (e.key === 'Enter') document.getElementById('search-btn').click();
};
window.explore = explore;
</script>
</body>
