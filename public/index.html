<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chicken Saga - Lineage Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/main.css">
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <span class="brand__title">CHICKEN SAGA</span>
      <small class="brand__subtitle">LINEAGE EXPLORER</small>
    </div>

    <form id="search-form" class="controls" novalidate>
      <label class="controls__group" for="depth-select">
        <span class="controls__label">Depth</span>
        <select id="depth-select" name="depth">
          <option value="2">2</option>
          <option value="3" selected>3</option>
          <option value="4">4</option>
          <option value="5">5</option>
        </select>
      </label>

      <label class="controls__group controls__group--input" for="search-input">
        <span class="controls__label">Chicken ID</span>
        <input id="search-input" name="chickenId" type="number" placeholder="Chicken ID" min="1" inputmode="numeric">
      </label>

      <button id="search-btn" type="submit">Explore</button>
    </form>
  </header>

  <main id="canvas" class="canvas" aria-label="Chicken lineage graph">
    <svg id="connectors" class="connectors"></svg>
    <section id="scene" class="scene" aria-live="polite"></section>
  </main>

  <aside id="info-panel" class="info-panel" aria-hidden="true">
    <button class="info-panel__close" id="panel-close" type="button" aria-label="Close details panel">x</button>
    <div class="info-panel__id" id="panel-id"></div>
    <div class="info-panel__sub" id="panel-sub"></div>
    <div id="panel-body"></div>
    <a class="info-panel__action" id="panel-link" href="#" target="_blank" rel="noreferrer">View in Game</a>
    <button class="info-panel__action" id="panel-explore" type="button">Explore This Chicken</button>
  </aside>

  <div id="status" class="status" role="status" aria-live="polite" aria-hidden="true">
    <div class="status__spinner"></div>
    <span id="status-text">Loading...</span>
  </div>

  <section id="empty" class="empty-state">
    <h1 class="empty-state__title">LINEAGE</h1>
    <p class="empty-state__copy">Enter a Chicken ID to explore its family tree with ancestors above and descendants below.</p>
    <p class="empty-state__hint">Search by chicken ID</p>
  </section>

  <aside class="legend" aria-label="Legend">
    <div class="legend__item"><span class="legend__dot legend__dot--root"></span>Root</div>
    <div class="legend__item"><span class="legend__dot legend__dot--ancestor"></span>Ancestors</div>
    <div class="legend__item"><span class="legend__dot legend__dot--descendant"></span>Descendants</div>
    <div class="legend__item"><span class="legend__dot legend__dot--unknown"></span>Unknown</div>
  </aside>

  <aside class="stats" aria-label="Graph statistics">
    Chickens: <span id="stat-nodes">0</span><br>
    Connections: <span id="stat-links">0</span>
  </aside>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
